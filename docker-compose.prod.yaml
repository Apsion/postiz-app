# Production Docker Compose for Postiz
# Deployment target: Dokploy (dokploy.apsion.com)
# Application URL: https://postiz.apsion.com

services:
  postiz:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_VERSION: '1.0.0'
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      # Core
      - NODE_ENV=production
      - DISABLE_REGISTRATION=true
      - TEMPORAL_ADDRESS=temporal:7233
      # Required — injected from Dokploy env editor
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MAIN_URL=${MAIN_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL}
      # Storage
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - UPLOAD_DIRECTORY=${UPLOAD_DIRECTORY:-}
      - NEXT_PUBLIC_UPLOAD_STATIC_DIRECTORY=${NEXT_PUBLIC_UPLOAD_STATIC_DIRECTORY:-}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-}
      - CLOUDFLARE_ACCESS_KEY=${CLOUDFLARE_ACCESS_KEY:-}
      - CLOUDFLARE_SECRET_ACCESS_KEY=${CLOUDFLARE_SECRET_ACCESS_KEY:-}
      - CLOUDFLARE_BUCKETNAME=${CLOUDFLARE_BUCKETNAME:-}
      - CLOUDFLARE_BUCKET_URL=${CLOUDFLARE_BUCKET_URL:-}
      - CLOUDFLARE_REGION=${CLOUDFLARE_REGION:-auto}
      # General
      - IS_GENERAL=${IS_GENERAL:-true}
      - NX_ADD_PLUGINS=${NX_ADD_PLUGINS:-false}
      # Optional — social platform API keys
      - X_API_KEY=${X_API_KEY:-}
      - X_API_SECRET=${X_API_SECRET:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-}
      - YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID:-}
      - YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET:-}
      - TIKTOK_CLIENT_ID=${TIKTOK_CLIENT_ID:-}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET:-}
      - THREADS_APP_ID=${THREADS_APP_ID:-}
      - THREADS_APP_SECRET=${THREADS_APP_SECRET:-}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - PINTEREST_CLIENT_ID=${PINTEREST_CLIENT_ID:-}
      - PINTEREST_CLIENT_SECRET=${PINTEREST_CLIENT_SECRET:-}
      - DRIBBBLE_CLIENT_ID=${DRIBBBLE_CLIENT_ID:-}
      - DRIBBBLE_CLIENT_SECRET=${DRIBBBLE_CLIENT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - DISCORD_BOT_TOKEN_ID=${DISCORD_BOT_TOKEN_ID:-}
      - SLACK_ID=${SLACK_ID:-}
      - SLACK_SECRET=${SLACK_SECRET:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - MASTODON_URL=${MASTODON_URL:-}
      - MASTODON_CLIENT_ID=${MASTODON_CLIENT_ID:-}
      - MASTODON_CLIENT_SECRET=${MASTODON_CLIENT_SECRET:-}
      # Optional — email
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-}
      # Optional — AI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Optional — payments
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_SIGNING_KEY=${STRIPE_SIGNING_KEY:-}
      - STRIPE_SIGNING_KEY_CONNECT=${STRIPE_SIGNING_KEY_CONNECT:-}
      # Optional — extension
      - EXTENSION_ID=${EXTENSION_ID:-}
    volumes:
      - uploads:/uploads  # Local file storage (optional if using Cloudflare R2)
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      postiz-network:
        priority: 1000        # Bridge — always available on reboot
      temporal-network:
        priority: 500         # Temporal gRPC communication
      dokploy-network:
        priority: 100         # Overlay — available after Dokploy starts
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:5000/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s  # Allow time for build and PM2 startup

  postiz-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postiz
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postiz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # No exposed ports - internal only

  postiz-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data  # Persist queue data
    networks:
      - postiz-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # No exposed ports - internal only

  # -----------------------
  # Temporal Stack
  # -----------------------
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: unless-stopped
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - 9200
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-network
    expose:
      - 5432
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: unless-stopped
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - temporal-network
    expose:
      - 7233
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    depends_on:
      - temporal
    stdin_open: true
    tty: true

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - temporal-network
    expose:
      - 8080
    # Uncomment to access Temporal UI from host:
    # ports:
    #   - '8080:8080'

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  uploads:
    driver: local
  temporal-postgres-data:
    driver: local
  temporal-elasticsearch-data:
    driver: local

networks:
  postiz-network:
    driver: bridge
  temporal-network:
    driver: bridge
  dokploy-network:
    external: true
